<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Leads - Rede Fluir</title>
    <!-- Google Fonts Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .colab-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
        }
        .colab-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .colab-logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
        }
        .colab-logo span {
            font-weight: 300;
            color: var(--text);
        }
    </style>
</head>
<body class="admin-body">
    <!-- LOGIN WINDOW OVERLAY -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-card">
            <div class="login-title">Painel de Leads</div>
            <div class="login-subtitle">Acesse com a sua senha de colaborador</div>
            <div class="login-error" id="login-error">Senha incorreta. Tente novamente.</div>
            <form id="login-form">
                <div class="admin-form-group" style="text-align: left; margin-bottom: 24px;">
                    <label class="admin-label" for="login-password">Senha de Acesso</label>
                    <input type="password" class="admin-control" id="login-password" placeholder="Digite sua senha..." required>
                </div>
                <button type="submit" class="btn-admin-save" style="width: 100%; justify-content: center; padding: 14px;">
                    Entrar no Painel
                </button>
            </form>
        </div>
    </div>

    <!-- MAIN DASHBOARD CONTENT (HIDDEN UNTIL AUTHENTICATED) -->
    <div id="main-content" style="display: none;">
        <header class="admin-header">
            <div class="admin-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                Rede Fluir <span style="font-weight:300; margin-left:5px; color:#64748b;">Leads</span>
            </div>
            <div class="admin-user">
                <span class="admin-badge">Colaborador</span>
                <button class="btn-logout" id="btn-logout">Sair</button>
            </div>
        </header>

        <main class="colab-container">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total de Leads</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label" style="color: #D97706; background-color: #FEF3C7; padding: 2px 8px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; display: inline-block;">Pendente</div>
                    <div class="stat-value" id="stat-pending">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label" style="color: #0284C7; background-color: #E0F2FE; padding: 2px 8px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; display: inline-block;">Em Atendimento</div>
                    <div class="stat-value" id="stat-contact">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label" style="color: #059669; background-color: #D1FAE5; padding: 2px 8px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; display: inline-block;">Matriculado</div>
                    <div class="stat-value" id="stat-enrolled">0</div>
                </div>
            </div>

            <!-- Leads Table Card -->
            <div class="admin-card">
                <div class="admin-card-title">Gerenciamento de Leads</div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px;">
                    <div style="display: flex; gap: 12px; flex: 1; max-width: 500px;">
                        <input type="text" class="admin-control" id="lead-search" placeholder="Buscar por nome, WhatsApp ou e-mail...">
                        <select class="admin-control" id="lead-filter-status" style="max-width: 180px; padding: 10px;">
                            <option value="todos">Todos os Status</option>
                            <option value="Pendente">Pendente</option>
                            <option value="Em Atendimento">Em Atendimento</option>
                            <option value="Matriculado">Matriculado</option>
                            <option value="Sem Interesse">Sem Interesse</option>
                        </select>
                    </div>
                    <button class="btn-admin-save" id="btn-export-csv" style="background-color: #16A34A;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        Exportar CSV
                    </button>
                </div>

                <div style="overflow-x: auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>WhatsApp</th>
                                <th>E-mail</th>
                                <th>Modalidade</th>
                                <th>Data de Cadastro</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="leads-tbody">
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">Carregando leads...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <svg class="toast-success-icon" viewBox="0 0 20 20">
            <path d="M10 2a8 8 0 100 16 8 8 0 000-16zm3.707 6.707l-4 4a1 1 0 01-1.414 0l-2-2a1 1 0 111.414-1.414L9 10.586l3.293-3.293a1 1 0 011.414 1.414z"/>
        </svg>
        <span id="toast-message">Status atualizado!</span>
    </div>

    <!-- Core App JS script -->
    <script src="app.js"></script>
    <script>
        // Init leads panel specific logic
        document.addEventListener('DOMContentLoaded', async () => {
            const isAuth = sessionStorage.getItem('colab_auth') === 'true';
            
            if (isAuth) {
                showDashboard();
            }
            
            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const passwordInput = document.getElementById('login-password').value;
                    const errorEl = document.getElementById('login-error');
                    
                    try {
                        const config = await getAppConfigAsync();
                        // Allow both collaborator password and admin password as fallback
                        if (passwordInput === config.colabPassword || passwordInput === config.adminPassword) {
                            sessionStorage.setItem('colab_auth', 'true');
                            showDashboard();
                        } else {
                            errorEl.style.display = 'block';
                        }
                    } catch (err) {
                        console.error(err);
                        alert("Erro ao validar acesso: " + err.message);
                    }
                });
            }
            
            const btnLogout = document.getElementById('btn-logout');
            if (btnLogout) {
                btnLogout.addEventListener('click', () => {
                    sessionStorage.removeItem('colab_auth');
                    window.location.reload();
                });
            }
        });

        async function showDashboard() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // Re-initialize Supabase and render
            await renderColabStats();
            await renderColabLeadsTable();
            
            // Listeners for filters and search
            document.getElementById('lead-search').addEventListener('input', renderColabLeadsTable);
            document.getElementById('lead-filter-status').addEventListener('change', renderColabLeadsTable);
            document.getElementById('btn-export-csv').addEventListener('click', exportColabLeadsCSV);
        }

        async function renderColabStats() {
            try {
                const leads = await getLeadsAsync();
                
                const stats = { total: 0, pending: 0, contact: 0, enrolled: 0 };
                if (leads) {
                    stats.total = leads.length;
                    leads.forEach(lead => {
                        if (lead.status === 'Pendente') stats.pending++;
                        else if (lead.status === 'Em Atendimento') stats.contact++;
                        else if (lead.status === 'Matriculado') stats.enrolled++;
                    });
                }
                
                document.getElementById('stat-total').textContent = stats.total;
                document.getElementById('stat-pending').textContent = stats.pending;
                document.getElementById('stat-contact').textContent = stats.contact;
                document.getElementById('stat-enrolled').textContent = stats.enrolled;
            } catch (err) {
                console.error(err);
            }
        }

        async function renderColabLeadsTable() {
            const tbody = document.getElementById('leads-tbody');
            const searchVal = document.getElementById('lead-search').value.toLowerCase();
            const statusFilter = document.getElementById('lead-filter-status').value;
            
            try {
                const leads = await getLeadsAsync();
                
                if (!leads || leads.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">Nenhum lead cadastrado ainda.</td></tr>`;
                    return;
                }
                
                const filteredData = leads.filter(lead => {
                    const matchesSearch = 
                        (lead.name && lead.name.toLowerCase().includes(searchVal)) ||
                        (lead.whatsapp && lead.whatsapp.toLowerCase().includes(searchVal)) ||
                        (lead.email && lead.email.toLowerCase().includes(searchVal));
                    
                    const matchesStatus = statusFilter === 'todos' || lead.status === statusFilter;
                    
                    return matchesSearch && matchesStatus;
                });
                
                if (filteredData.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">Nenhum lead encontrado com os filtros aplicados.</td></tr>`;
                    return;
                }
                
                tbody.innerHTML = '';
                filteredData.forEach(lead => {
                    const tr = document.createElement('tr');
                    const formattedDate = new Date(lead.date).toLocaleDateString('pt-BR', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    
                    tr.innerHTML = `
                        <td><strong>${lead.name}</strong></td>
                        <td><a href="https://wa.me/${lead.whatsapp.replace(/\D/g, '')}" target="_blank" style="color: var(--primary); font-weight: 600;">${lead.whatsapp}</a></td>
                        <td>${lead.email || '-'}</td>
                        <td><span class="badge" style="background-color: var(--primary-light); color: var(--primary);">${lead.modality || '-'}</span></td>
                        <td>${formattedDate}</td>
                        <td>
                            <select class="status-select ${getStatusClass(lead.status)}" data-id="${lead.id}">
                                <option value="Pendente" ${lead.status === 'Pendente' ? 'selected' : ''}>Pendente</option>
                                <option value="Em Atendimento" ${lead.status === 'Em Atendimento' ? 'selected' : ''}>Em Atendimento</option>
                                <option value="Matriculado" ${lead.status === 'Matriculado' ? 'selected' : ''}>Matriculado</option>
                                <option value="Sem Interesse" ${lead.status === 'Sem Interesse' ? 'selected' : ''}>Sem Interesse</option>
                            </select>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                
                // Add change status listeners
                document.querySelectorAll('.status-select').forEach(select => {
                    select.addEventListener('change', async (e) => {
                        const leadId = e.target.getAttribute('data-id');
                        const newStatus = e.target.value;
                        e.target.className = `status-select ${getStatusClass(newStatus)}`;
                        
                        await updateLeadStatusAsync(leadId, newStatus);
                        await renderColabStats();
                        showColabToast('Status do lead atualizado!');
                    });
                });
            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 40px; color: #DC2626;">Erro ao carregar leads: ${err.message}</td></tr>`;
            }
        }

        function getStatusClass(status) {
            switch (status) {
                case 'Pendente': return 'badge-pending';
                case 'Em Atendimento': return 'badge-contact';
                case 'Matriculado': return 'badge-enrolled';
                case 'Sem Interesse': return 'badge-nointerest';
                default: return '';
            }
        }

        function showColabToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function exportColabLeadsCSV() {
            try {
                const leads = await getLeadsAsync();
                
                if (!leads || leads.length === 0) {
                    alert('Não há dados para exportar.');
                    return;
                }
                
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                csvContent += "Nome;WhatsApp;E-mail;Modalidade;Data/Hora;Status\n";
                
                leads.forEach(lead => {
                    const formattedDate = new Date(lead.date).toLocaleString('pt-BR');
                    csvContent += `"${lead.name}";"${lead.whatsapp}";"${lead.email || ''}";"${lead.modality || ''}";"${formattedDate}";"${lead.status}"\n`;
                });
                
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `leads_rede_fluir_colab_${new Date().toLocaleDateString('pt-BR')}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                alert('Erro ao exportar CSV: ' + err.message);
            }
        }
    </script>
</body>
</html>
